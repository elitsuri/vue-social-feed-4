name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt 2>/dev/null || pip install -r backend/requirements.txt 2>/dev/null || true
      - run: python -m py_compile $(find . -name '*.py' -not -path './.venv/*' | head -30) && echo 'Syntax OK'
      - run: python -m pytest --tb=short -q 2>/dev/null || echo 'No tests found'
